[package]
name = "grunionnn/animationmanager"
description = "A lightweight Roblox animation manager for Wally that handles loading, unloading, playback, preloading, markers, and cleanup for animation sets and individual animations"
Authors = ["Grunion"]
license = "MIT"
exclude = ["sourcemap.json"]
version = "1.0.2"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
Trove = "sleitnick/trove@1.8.0"
GoodSignal = "stravant/goodsignal@0.3.1"
Networker = "grunionnn/networker@0.3.1"
